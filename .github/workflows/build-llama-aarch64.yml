name: build llama.cpp for linux arm64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          path: llama.cpp

      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

      - name: Configure
        run: |
          cd llama.cpp
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++

      - name: Build
        run: |
          cd llama.cpp
          cmake --build build --target llama-server llama-cli -j2

      - name: Package
        run: |
          mkdir -p out
          cp llama.cpp/build/bin/llama-server out/
          cp llama.cpp/build/bin/llama-cli out/

          find llama.cpp/build -type f \( -name "*.so" -o -name "*.so.*" \) -exec cp -a {} out/ \; || true

          aarch64-linux-gnu-strip out/llama-server || true
          aarch64-linux-gnu-strip out/llama-cli || true
          aarch64-linux-gnu-strip out/*.so* || true

          tar -C out -czf llama-cpp-linux-aarch64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-linux-aarch64
          path: llama-cpp-linux-aarch64.tar.gz
